<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasket - Archives</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #fafafa;
            --bg-alt: #f6f5f4;
            --card-bg: #ffffff;
            --card-border: #deddda;
            --text: #2e3436;
            --text-secondary: #5e5c64;
            --accent: #2e3436;
            --accent-hover: #000000;
            --accent-light: #e8e8e8;
            --shadow: rgba(0,0,0,0.08);
            --shadow-hover: rgba(0,0,0,0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --bg-alt: #252525;
                --card-bg: #2a2a2a;
                --card-border: #3a3a3a;
                --text: #ffffff;
                --text-secondary: #888888;
                --accent: #ffffff;
                --accent-hover: #dddddd;
                --accent-light: #333333;
                --shadow: rgba(0,0,0,0.4);
                --shadow-hover: rgba(0,0,0,0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--card-border);
        }

        .logo {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            position: relative;
            background: var(--bg-alt);
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            transition: transform 0.5s ease;
        }

        .logo:hover img {
            transform: rotate(180deg);
        }

        .logo::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            bottom: 8px;
            right: 8px;
            opacity: 0.4;
        }

        .gear-accent {
            position: absolute;
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .gear-accent.top-left { top: 8px; left: 8px; }
        .gear-accent.bottom-right { bottom: 8px; right: 8px; transform: rotate(180deg); }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
        }

        .nav a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav a:hover {
            background: var(--bg-alt);
            color: var(--text);
        }

        .nav a.active {
            background: var(--text);
            color: var(--bg);
        }

        .archives-header {
            margin-bottom: 24px;
        }

        .archives-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .archives-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .release-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .release-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .release-item:hover {
            box-shadow: 0 4px 16px var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .release-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .release-tag {
            font-weight: 600;
            font-size: 1rem;
        }

        .release-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .release-download {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .release-download:hover {
            background: var(--accent-light);
        }

        .release-download::before {
            content: '↓';
        }

        footer {
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><img src="com.gasket.app.svg" alt="Gasket"></div>
            <div>
                <h1>Gasket</h1>
                <p class="subtitle">Steam Deck Key Injection</p>
            </div>
        </header>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="archives.html" class="active">Archives</a>
        </nav>

        <div class="archives-header">
            <h2>Release Archives</h2>
            <p>All previous versions of Gasket</p>
        </div>

        <div class="release-list" id="release-list"></div>

        <footer>
            <p>🄯 2026 Gasket · <a href="https://github.com/dim-ghub/Gasket-Releases">GitHub</a></p>
        </footer>
    </div>

    <script>
        fetch('https://api.github.com/repos/dim-ghub/Gasket-Releases/releases')
            .then(r => r.json())
            .then(releases => {
                const list = document.getElementById('release-list');
                if (!releases || releases.length === 0) {
                    list.innerHTML = '<div class="empty-state">No releases available</div>';
                    return;
                }

                // Skip latest (show older releases)
                const older = releases.slice(1);
                
                if (older.length === 0) {
                    list.innerHTML = '<div class="empty-state">No previous releases available</div>';
                    return;
                }

                older.forEach(rel => {
                    const asset = rel.assets.find(a => a.name.endsWith('.AppImage'));
                    const item = document.createElement('div');
                    item.className = 'release-item';
                    item.innerHTML = `
                        <div class="release-info">
                            <span class="release-tag">${rel.tag_name}</span>
                            <span class="release-date">${new Date(rel.published_at).toLocaleDateString()}</span>
                        </div>
                        ${asset ? `<a href="${asset.browser_download_url}" class="release-download">Download</a>` : ''}
                    `;
                    list.appendChild(item);
                });
            })
            .catch(() => {
                document.getElementById('release-list').innerHTML = '<div class="empty-state">Failed to load releases</div>';
            });
    </script>
</body>
</html>
