<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <g fill="none" stroke="#2A2A2A" stroke-width="0.8">
    <!-- Orbital rings -->
    <circle cx="100" cy="100" r="40"/>
    <circle cx="100" cy="100" r="60"/>
    <circle cx="100" cy="100" r="80"/>
    <circle cx="100" cy="100" r="95"/>
    <!-- Gear outline -->
    <circle cx="100" cy="100" r="20" stroke-width="1.2"/>
    <circle cx="100" cy="100" r="12" stroke-width="1.2"/>
    <!-- Gear teeth hints -->
    <line x1="100" y1="78" x2="100" y2="84"/>
    <line x1="100" y1="116" x2="100" y2="122"/>
    <line x1="78" y1="100" x2="84" y2="100"/>
    <line x1="116" y1="100" x2="122" y2="100"/>
    <!-- Crosshair -->
    <line x1="100" y1="5" x2="100" y2="15"/>
    <line x1="100" y1="185" x2="100" y2="195"/>
    <line x1="5" y1="100" x2="15" y2="100"/>
    <line x1="185" y1="100" x2="195" y2="100"/>
    <!-- Stars -->
    <circle cx="30" cy="25" r="1.5" fill="#333333" stroke="none"/>
    <circle cx="170" cy="40" r="1.2" fill="#333333" stroke="none"/>
    <circle cx="50" cy="160" r="1.8" fill="#333333" stroke="none"/>
    <circle cx="155" cy="170" r="1" fill="#333333" stroke="none"/>
    <circle cx="80" cy="30" r="0.8" fill="#333333" stroke="none"/>
    <circle cx="140" cy="140" r="1.4" fill="#333333" stroke="none"/>
    <circle cx="25" cy="90" r="1" fill="#333333" stroke="none"/>
    <circle cx="175" cy="110" r="1.5" fill="#333333" stroke="none"/>
  </g>
</svg>
