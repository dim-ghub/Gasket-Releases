        body {

        .container {

        .logo {

        .logo img {

        }

        .logo:hover img {
            transform: rotate(180deg);
        }

        .logo::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            bottom: 8px;
            right: 8px;
            opacity: 0.4;
        }

        .gear-accent {

            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .gear-accent.top-left { top: 8px; left: 8px; }
        .gear-accent.bottom-right { bottom: 8px; right: 8px; transform: rotate(180deg); }

        header h1 {

            letter-spacing: -0.5px;
        }

        .subtitle {

        }

        .nav {

            gap: 8px;

        }

            font-weight: 500;

        }

        .nav a:hover {
            background: var(--bg-alt);

        }

        .nav a.active {
            background: var(--text);
            color: var(--bg);
        }

        .hero {

            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .download-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.2s ease;
        }

        .download-card:hover {
            box-shadow: 0 4px 16px var(--shadow-hover);
            transform: translateY(-2px);

        .version-badge {

            gap: 6px;

            color: var(--bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .version-badge::before {
            content: '●';
            font-size: 8px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--text);
            color: var(--bg);
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            margin: 16px 0;
        }

        .download-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .download-btn::before {
            content: '↓';
            font-size: 1.2rem;
        }

        .download-meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .changelog {
            background: var(--card-bg);

        .changelog-content {

            color: var(--text-secondary);
            max-height: 300px;
            overflow-y: auto;
        }

        .changelog-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .changelog-content a:hover {
            text-decoration: underline;
        }

        .changelog-content pre {
            background: var(--bg-alt);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin: 10px 0;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .feature {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .feature:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 12px var(--shadow);
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .feature h3 {
            font-size: 0.95rem;

        .feature p {
            font-size: 0.85rem;
            color: var(--text-secondary);

        footer {

        footer a {

        .steamos-card {

        }

        .steamos-card h2 {

        .steamos-card p {

        }

        .steamos-card a {
            color: var(--accent);
            text-decoration: none;
        }

        .steamos-card a:hover {
            text-decoration: underline;
        }

<body>
    <div class="container">
        <header>
            <div class="logo"><img src="com.gasket.app.svg" alt="Gasket"></div>
            <div>
                <h1>Gasket</h1>
                <p class="subtitle">Steam Deck Key Injection</p>
            </div>
        </header>

        <nav class="nav">
            <a href="#" class="active">Home</a>
            <a href="archives.html">Archives</a>
        </nav>

        <div class="hero">
            <div class="download-card">
                <span class="gear-accent top-left">⚙</span>
                <span class="gear-accent bottom-right">⚙</span>
                <span class="version-badge" id="version-badge"></span>
                <a href="#" class="download-btn" id="download-btn">Download Latest</a>
                <p class="download-meta" id="download-meta"></p>
            </div>

            <div class="changelog">
                <h2>Release Notes</h2>
                <div class="changelog-content" id="changelog"></div>
            </div>
        </div>

        <div class="steamos-card">
            <h2>SteamOS Not Supported</h2>
            <p>Gasket does not support SteamOS. The AppImage requires system libraries not available on SteamOS's read-only filesystem.</p>
            <p><strong>Recommended Alternative:</strong> <a href="https://cachyos.org/download/" target="_blank">CachyOS Handheld Edition</a> is a Steam Deck-friendly distribution with full AppImage support and a desktop environment.</p>
        </div>

        <footer>
            <p>🄯 2026 Gasket · <a href="https://github.com/dim-ghub/Gasket-Releases">GitHub</a></p>
        </footer>
    </div>

    <script>
        fetch('https://api.github.com/repos/dim-ghub/Gasket-Releases/releases')
            .then(r => r.json())
            .then(releases => {
                if (!releases || releases.length === 0) return;
                
                const latest = releases[0];
                const asset = latest.assets.find(a => a.name.endsWith('.AppImage'));

                document.getElementById('version-badge').textContent = latest.tag_name;
                
                if (asset) {
                    document.getElementById('download-btn').href = asset.browser_download_url;
                    const size = (asset.size / 1024 / 1024).toFixed(1);
                    document.getElementById('download-meta').textContent = 
                        `${asset.name} · ${size} MB`;
                }

                const body = latest.body || 'No release notes available.';
                document.getElementById('changelog').innerHTML = body
                    .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre>$2</pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                    .replace(/\n/g, '<br>');
            })
            .catch(() => {
                document.getElementById('changelog').innerHTML = '<p>Failed to load release info.</p>';
            });

    </script>
