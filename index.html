<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasket Releases</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #fff; }
        .release {
            background: #16213e;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .release a {
            color: #4cc9f0;
            font-size: 18px;
            text-decoration: none;
        }
        .release a:hover { text-decoration: underline; }
        .date { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Gasket Releases</h1>
    <p>GTK4 application for searching Steam games and injecting depot keys.</p>
    <div id="releases"></div>
    <script>
        fetch('https://api.github.com/repos/dim-ghub/Gasket-Releases/releases')
            .then(r => r.json())
            .then(releases => {
                const div = document.getElementById('releases');
                releases.forEach(rel => {
                    const el = document.createElement('div');
                    el.className = 'release';
                    const asset = rel.assets.find(a => a.name.endsWith('.AppImage'));
                    if (asset) {
                        el.innerHTML = `<a href="${asset.browser_download_url}">${rel.name}</a><br><span class="date">${new Date(rel.published_at).toLocaleDateString()}</span>`;
                        div.appendChild(el);
                    }
                });
            });
    </script>
</body>
</html>
