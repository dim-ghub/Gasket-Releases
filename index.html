<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasket - Steam Key Injector</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #fafafa;
            --bg-alt: #f6f5f4;
            --card-bg: #ffffff;
            --card-border: #deddda;
            --text: #2e3436;
            --text-secondary: #5e5c64;
            --accent: #2e3436;
            --accent-hover: #000000;
            --shadow: rgba(0,0,0,0.06);
            --shadow-hover: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --bg-alt: #1e1e1e;
                --card-bg: #1a1a1a;
                --card-border: #2d2d2d;
                --text: #eeeeee;
                --text-secondary: #a0a0a0;
                --accent: #ffffff;
                --accent-hover: #cccccc;
                --shadow: rgba(0,0,0,0.3);
                --shadow-hover: rgba(0,0,0,0.4);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 48px;
        }

        .logo-container {
            width: 72px;
            height: 72px;
            background: var(--bg-alt);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo-container:hover img {
            transform: rotate(180deg);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .nav a {
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            background: transparent;
        }

        .nav a:hover {
            color: var(--text);
            background: var(--bg-alt);
        }

        .nav a.active {
            background: var(--text);
            color: var(--bg);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
            margin-bottom: 48px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .download-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .version-tag {
            background: var(--bg-alt);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--text);
            color: var(--bg);
            padding: 16px 36px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
        }

        .meta-text {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .changelog {
            display: flex;
            flex-direction: column;
        }

        .changelog h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .changelog-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-height: 100px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .changelog-content::-webkit-scrollbar { width: 4px; }
        .changelog-content::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

        .changelog-content a { color: var(--text); font-weight: 500; }
        .changelog-content code { background: var(--bg-alt); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        .info-bar {
            background: #ffeb3b22;
            border: 1px solid #fbc02d66;
            color: var(--text);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 48px;
        }
        
        [data-theme="dark"] .info-bar { background: #ffd60011; border-color: #ffd60033; }

        .info-bar h3 { font-size: 1rem; margin-bottom: 8px; }
        .info-bar p { font-size: 0.9rem; opacity: 0.8; }
        .info-bar a { color: var(--text); font-weight: 600; }

        .help-section {
            margin-bottom: 48px;
            text-align: center;
        }

        .help-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .help-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-help {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid var(--card-border);
            color: var(--text);
            background: var(--card-bg);
        }

        .btn-help:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-hover);
            border-color: var(--text);
        }

        footer {
            border-top: 1px solid var(--card-border);
            padding-top: 32px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        footer a { color: inherit; text-decoration: none; font-weight: 500; }
        footer a:hover { color: var(--text); }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; text-align: center; }
            .container { padding-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="com.gasket.app.svg" alt="Gasket Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3524/3524659.png'">
            </div>
            <div>
                <h1>Gasket</h1>
                <p class="subtitle">Fast, Reliable Steam Key Injection</p>
            </div>
        </header>

        <nav class="nav">
            <a href="#" class="active">Home</a>
            <a href="https://dim-ghub.github.io/Gasket-Releases/archives.html">Archives</a>
        </nav>

        <div class="main-grid">
            <div class="card download-section">
                <div class="version-tag" id="version-tag">Checking for updates...</div>
                <a href="https://github.com/dim-ghub/Gasket-Releases/releases/latest" class="btn-primary" id="main-download-btn">
                    Download Latest
                </a>
                <p class="meta-text" id="download-info">Connecting to GitHub...</p>
            </div>

            <div class="card changelog">
                <h2>Release Notes</h2>
                <div class="changelog-content" id="changelog-body">
                    Fetching latest changes...
                </div>
            </div>
        </div>

        <div class="help-section">
            <h3>Need help?</h3>
            <div class="help-buttons">
                <a href="https://matrix.to/#/#gasket-support:beeper.com" target="_blank" class="btn-help">Join Matrix Space</a>
                <a href="https://github.com/dim-ghub/Gasket-Releases/issues" target="_blank" class="btn-help">Open an Issue</a>
            </div>
        </div>

        <footer>
            <p>🄯 2026 Gasket Project · <a href="https://github.com/dim-ghub/Gasket-Releases">Source Code</a></p>
        </footer>
    </div>

    <script>
        async function fetchReleases() {
            try {
                const response = await fetch('https://api.github.com/repos/dim-ghub/Gasket-Releases/releases');
                if (!response.ok) throw new Error('API Rate Limit');
                
                const releases = await response.json();
                if (releases && releases.length > 0) {
                    const latest = releases[0];
                    const appImage = latest.assets.find(a => a.name.endsWith('.AppImage'));

                    // Update UI
                    document.getElementById('version-tag').textContent = latest.tag_name;
                    
                    if (appImage) {
                        document.getElementById('main-download-btn').href = appImage.browser_download_url;
                        const sizeMB = (appImage.size / (1024 * 1024)).toFixed(1);
                        document.getElementById('download-info').textContent = `${appImage.name} (${sizeMB} MB)`;
                    }

                    // Simple Markdown to HTML parser
                    const body = latest.body || 'No release notes provided.';
                    document.getElementById('changelog-body').innerHTML = body
                        .replace(/### (.*)/g, '<h4 style="margin:10px 0 5px; color:var(--text);">$1</h4>')
                        .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
                        .replace(/`([^`]+)`/g, '<code>$1</code>')
                        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                        .replace(/\n/g, '<br>');
                }
            } catch (error) {
                console.error("Failed to load releases:", error);
                document.getElementById('version-tag').textContent = "v1.0.0-latest";
                document.getElementById('download-info').textContent = "Check GitHub for .AppImage assets.";
                document.getElementById('changelog-body').textContent = "Could not fetch release notes. GitHub API may be busy.";
            }
        }

        window.addEventListener('DOMContentLoaded', fetchReleases);
    </script>
</body>
</html>
